server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:auth_db}
    username: ${DB_USERNAME:auth_service}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Nao inclui o nome da classe Java no header da mensagem: o contrato entre servicos
        # e o JSON do NotificationEvent, nao o tipo Java do produtor (ver ADR-0003).
        spring.json.add.type.headers: false

app:
  jwt:
    # Obrigatorio via variavel de ambiente; sem valor padrao (RNF-030).
    secret: ${JWT_SECRET:?defina a variavel de ambiente JWT_SECRET com pelo menos 32 caracteres}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:3600}
  account-lock:
    max-failed-attempts: ${ACCOUNT_LOCK_MAX_ATTEMPTS:5}
    lock-duration-minutes: ${ACCOUNT_LOCK_DURATION_MINUTES:15}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    readiness-state:
      enabled: true
    liveness-state:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId:-}] %-5level %logger{36} - %msg%n"
