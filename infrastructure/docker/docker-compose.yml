    healthcheck:
      <<: *hc-defaults
      test: ["CMD-SHELL", "pg_isready -U ${STUDY_PLAN_DB_USER:-study_plan_db_user} -d ${STUDY_PLAN_DB_NAME:-study_plan_db}"]

  study-plan-service:
