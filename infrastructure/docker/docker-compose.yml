    container_name: gabaritai-study-plan-db
    environment:
      POSTGRES_DB: ${STUDY_PLAN_DB_NAME:-study_plan_db}
      POSTGRES_USER: ${STUDY_PLAN_DB_USER:-study_plan_db_user}
      POSTGRES_PASSWORD: ${STUDY_PLAN_DB_PASSWORD:?STUDY_PLAN_DB_PASSWORD is required, copy .env.example to .env}
    volumes:
