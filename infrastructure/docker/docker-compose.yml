    name: gabaritai-public
  gabaritai-application:
    name: gabaritai-application
  gabaritai-data:
    name: gabaritai-data
  # Redes reservadas para observabilidade e agentes de CI/CD (RNF-017),
  # ainda sem servicos conectados neste estagio de scaffolding (ver ADR-0001).
  gabaritai-monitoring:
    name: gabaritai-monitoring
  gabaritai-cicd:
    name: gabaritai-cicd

volumes:
  kafka-data:
  auth-db-data:
  user-db-data:
  edital-db-data:
  study-plan-db-data:
  ai-db-data:
  notification-db-data:
