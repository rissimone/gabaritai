  ai-db:
    <<: *postgres-common
    container_name: gabaritai-ai-db
    environment:
      POSTGRES_DB: ${AI_DB_NAME:-ai_db}
      POSTGRES_USER: ${AI_DB_USER:-ai_db_user}
      POSTGRES_PASSWORD: ${AI_DB_PASSWORD:?AI_DB_PASSWORD is required, copy .env.example to .env}
