      DB_USERNAME: ${STUDY_PLAN_DB_USER:-study_plan_db_user}
      DB_PASSWORD: ${STUDY_PLAN_DB_PASSWORD:?STUDY_PLAN_DB_PASSWORD is required, copy .env.example to .env}
    depends_on:
